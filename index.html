<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso de Pedido | Axis MC Logística // DLG Logistic</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
background:#0c0f14;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#1f2937;
padding:40px;
border-radius:15px;
width:100%;
max-width:600px;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

.titulo{
text-align:center;
margin-bottom:30px;
font-size:24px;
}

label{
display:block;
margin-top:15px;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
margin-top:5px;
}

button{
margin-top:25px;
padding:14px;
width:100%;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#1f2937;
padding:30px;
border-radius:12px;
max-width:400px;
width:90%;
}

.guia{
font-size:22px;
font-weight:700;
color:#60a5fa;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<h1 class="titulo">Ingreso de Pedido DLG Logistic</h1>

<label>Cliente</label>
<input id="cliente">

<label>Pedido de</label>
<input id="retiro">

<label>Teléfono</label>
<input id="telefono">

<label>Email</label>
<input id="email">

<label>Provincia</label>
<input id="provincia">

<label>Cantón</label>
<input id="canton">

<label>Número de Guía DLG</label>
<input id="guiaDLG" placeholder="Ej: DLG-123456">

<label>Señas</label>
<input id="senas">

<label>Ubicación</label>
<input id="ubicacion">

<label>Horario</label>
<input id="horario">

<button id="btnEnviar" onclick="enviarPedido()">Guardar Pedido</button>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<h3>Pedido Guardado</h3>
<div class="guia" id="numeroGuia"></div>

<pre id="popupTexto"></pre>

<button onclick="cerrarPopup()">Aceptar</button>

</div>
</div>

<script>

function generarGuia(){

let now = new Date();

return "AX-" +
now.getFullYear().toString().slice(2) +
("0"+(now.getMonth()+1)).slice(-2) +
("0"+now.getDate()).slice(-2) +
("0"+now.getHours()).slice(-2) +
("0"+now.getMinutes()).slice(-2) +
("0"+now.getSeconds()).slice(-2);

}

async function enviarPedido(){

let btn=document.getElementById("btnEnviar");

btn.innerText="Guardando...";
btn.disabled=true;

let guia = generarGuia();

let data={

guia:guia,
guiaDLG:document.getElementById("guiaDLG").value,

cliente:document.getElementById("cliente").value,
retiro:document.getElementById("retiro").value,
telefono:document.getElementById("telefono").value,
email:document.getElementById("email").value,
provincia:document.getElementById("provincia").value,
canton:document.getElementById("canton").value,
senas:document.getElementById("senas").value,
ubicacion:document.getElementById("ubicacion").value,
horario:document.getElementById("horario").value

};

try{

await fetch("https://script.google.com/macros/s/AKfycbynQJmJWF_J6H1fSBtjDJW7jpahflAFY3v_oLz9n2-LmcAe99_V4qPvzdPsro8f30fMhg/exec",{
method:"POST",
body:new URLSearchParams(data)
});

document.getElementById("numeroGuia").innerText="Guía: "+guia;

let info =
`Guía Axis: ${guia}
Guía DLG: ${data.guiaDLG}

Cliente: ${data.cliente}
Teléfono: ${data.telefono}

Provincia: ${data.provincia}
Cantón: ${data.canton}

Señas:
${data.senas}

Ubicación:
${data.ubicacion}

Horario:
${data.horario}`;

document.getElementById("popupTexto").innerText=info;
document.getElementById("popup").style.display="flex";

btn.innerText="Guardar Pedido";
btn.disabled=false;

document.querySelectorAll("input").forEach(i=>i.value="");

}catch(err){

alert("Error al guardar");
btn.innerText="Guardar Pedido";
btn.disabled=false;

}

}

function cerrarPopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
