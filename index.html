<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Axis MC Logística | Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat;
background:#0c0f14;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.wrapper{
display:flex;
gap:30px;
width:100%;
max-width:1100px;
flex-wrap:wrap;
}

.container, .rastreo-box{
background:#1f2937;
padding:30px;
border-radius:15px;
box-shadow:0 0 40px rgba(0,0,0,.5);
flex:1;
min-width:320px;
}

h1,h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:none;
margin-top:5px;
}

button{
margin-top:15px;
padding:14px;
width:100%;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

/* ESTADOS */
.estado{
font-weight:700;
padding:8px 14px;
border-radius:6px;
display:inline-block;
margin-top:10px;
}

.pendiente{background:#ef4444;}
.ruta{background:#f59e0b;}
.entregado{background:#22c55e;}

/* TIMELINE */
.timeline{
margin-top:20px;
border-left:2px solid #555;
padding-left:15px;
}

.step{
margin-bottom:15px;
position:relative;
}

.step::before{
content:"";
position:absolute;
left:-9px;
top:5px;
width:12px;
height:12px;
background:#555;
border-radius:50%;
}

.step.active::before{
background:#22c55e;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#1f2937;
padding:30px;
border-radius:12px;
max-width:400px;
width:90%;
}

.guia{
font-size:20px;
font-weight:700;
color:#60a5fa;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="wrapper">

<!-- FORMULARIO -->
<div class="container">

<h1>Ingreso Pedido</h1>

<label>Cliente</label>
<input id="cliente">

<label>Pedido de</label>
<input id="retiro">

<label>Teléfono</label>
<input id="telefono">

<label>Email</label>
<input id="email">

<label>Provincia</label>
<input id="provincia">

<label>Cantón</label>
<input id="canton">

<label>Guía DLG</label>
<input id="guiaDLG">

<label>Señas</label>
<input id="senas">

<label>Ubicación</label>
<input id="ubicacion">

<label>Horario</label>
<input id="horario">

<button onclick="enviarPedido()" id="btnEnviar">Guardar Pedido</button>

</div>

<!-- RASTREO -->
<div class="rastreo-box">

<h2>Rastrear Envío</h2>

<input id="guiaBuscar" placeholder="Ingrese guía">

<button onclick="rastrear()">Buscar</button>

<div id="resultadoRastreo"></div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>Pedido Guardado</h3>
<div class="guia" id="numeroGuia"></div>
<div id="popupTexto"></div>

<button onclick="cerrarPopup()">Aceptar</button>

</div>
</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzIsyYv4HhvFGxsRRp8HsvbcWrFmw59XKJ1klMtcFOYnmIgJz5OYCFQleiWvwtZp9NV-g/exec";

/* GENERAR GUIA */
function generarGuia(){
let now=new Date();
return "AX-"+
now.getFullYear().toString().slice(2)+
("0"+(now.getMonth()+1)).slice(-2)+
("0"+now.getDate()).slice(-2)+
("0"+now.getHours()).slice(-2)+
("0"+now.getMinutes()).slice(-2)+
("0"+now.getSeconds()).slice(-2);
}

/* ENVIAR */
async function enviarPedido(){

let btn=document.getElementById("btnEnviar");
btn.innerText="Guardando...";
btn.disabled=true;

let guia=generarGuia();

let data={
guia:guia,
guiaDLG:document.getElementById("guiaDLG").value,
cliente:document.getElementById("cliente").value,
retiro:document.getElementById("retiro").value,
telefono:document.getElementById("telefono").value,
email:document.getElementById("email").value,
provincia:document.getElementById("provincia").value,
canton:document.getElementById("canton").value,
senas:document.getElementById("senas").value,
ubicacion:document.getElementById("ubicacion").value,
horario:document.getElementById("horario").value
};

try{

await fetch(URL,{
method:"POST",
body:new URLSearchParams(data)
});

document.getElementById("numeroGuia").innerText="Guía: "+guia;

document.getElementById("popupTexto").innerHTML=
`
<b>Guía Axis:</b> ${guia}<br>
<b>Guía DLG:</b> ${data.guiaDLG || "-"}<br><br>

<b>Cliente:</b> ${data.cliente}<br>
<b>Teléfono:</b> ${data.telefono}<br>
<b>Email:</b> ${data.email}<br><br>

<b>Provincia:</b> ${data.provincia}<br>
<b>Cantón:</b> ${data.canton}<br><br>

<b>Señas:</b> ${data.senas}<br>
<b>Ubicación:</b> ${data.ubicacion}<br>
<b>Horario:</b> ${data.horario}
`;

document.getElementById("popup").style.display="flex";

btn.innerText="Guardar Pedido";
btn.disabled=false;

document.querySelectorAll("input").forEach(i=>i.value="");

}catch(err){

alert("Error al guardar");
btn.innerText="Guardar Pedido";
btn.disabled=false;

}

}

/* COLORES */
function colorEstado(estado){
if(estado==="Pendiente") return "pendiente";
if(estado==="En ruta") return "ruta";
if(estado==="Entregado") return "entregado";
return "";
}

/* TIMELINE */
function pintarTimeline(estado){

let pasos=["Pendiente","En ruta","Entregado"];
let index=pasos.indexOf(estado);

let html="";

pasos.forEach((paso,i)=>{
html+=`<div class="step ${i<=index ? "active":""}">${paso}</div>`;
});

document.getElementById("resultadoRastreo").innerHTML+=
`<div class="timeline">${html}</div>`;
}

/* RASTREO */
async function rastrear(){

let guia=document.getElementById("guiaBuscar").value.trim();

if(!guia){
document.getElementById("resultadoRastreo").innerHTML="Ingrese una guía";
return;
}

try{

let res=await fetch(URL+"?guia="+encodeURIComponent(guia));
let text=await res.text();

console.log("RESPUESTA:",text);

let data=JSON.parse(text);

if(data.error){
document.getElementById("resultadoRastreo").innerHTML="Guía no encontrada";
return;
}

let clase=colorEstado(data.estado);

document.getElementById("resultadoRastreo").innerHTML=
`
Guía Axis: <b>${data.guia}</b><br>
Guía DLG: ${data.guiaDLG || "-"}<br>
Cliente: ${data.cliente}<br>
Provincia: ${data.provincia}<br>
Cantón: ${data.canton}<br>

<div class="estado ${clase}">
${data.estado}
</div>
`;

pintarTimeline(data.estado);

}catch(err){

console.error(err);
document.getElementById("resultadoRastreo").innerHTML="Error consultando";

}

}

function cerrarPopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
